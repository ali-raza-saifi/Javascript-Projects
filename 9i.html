<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart Quantity Project</title>
</head>
<body>
  
<p>
  <button class="show-quantity-btn" onclick="
    updateCartQuantity(0);
    document.querySelector('.cart-quantity-para')
    .innerHTML =`Cart Quantity is ${cartQuantity}`;
    " >Show Quantity</button>
  <button class="add-to-cart-btn" onclick="
  updateCartQuantity(+1);
  
  ">Add to Cart</button>
  <button class="+2-btn" onclick="
  updateCartQuantity(+2);
  ">+2</button>
    <button class="+3-btn" onclick="
    updateCartQuantity(+3);
    ">+3</button>
      <button class="+4-btn" onclick="
      updateCartQuantity(+4);
      ">+4</button>
        <button class="+5-btn" onclick="
        updateCartQuantity(+5);
        ">+5</button>
         <button class="remove-from-cart-btn" onclick="
         updateCartQuantity(-1);
         ">Remove from cart</button>
          <button class="-2-btn" onclick="
          updateCartQuantity(-2);
          ">-2</button>
           <button class="-3-btn" onclick="
           updateCartQuantity(-3);
           ">-3</button>
           <button class="reset-btn" onclick="
           cartQuantity=0;
           console.log('Cart was reset.')
           console.log(`Cart Quantity: ${cartQuantity }`)">Reset Cart</button>
        
</p>
<p class="cart-quantity-para"></p>
  <script>

let cartQuantity = 0;
function updateCartQuantity(change){
if(cartQuantity + change >10){
alert('The cart is full');
return;
}
cartQuantity+= change;
console.log(`Cart Quantity is : ${cartQuantity}`);
return cartQuantity;
}
console.log(cartQuantity);
  </script>
</body>
</html>
