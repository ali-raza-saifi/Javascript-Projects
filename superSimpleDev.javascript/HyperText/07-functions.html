function convertLength(length, from, to) {
  let result;

  if (from === 'km') {
    if (to === 'm') {
      result = length * 1000;
    } else if (to === 'cm') {
      result = length * 100000;
    } else {
      result = length;
    }
  } else if (from === 'm') {
    if (to === 'km') {
      result = length / 1000;
    } else if (to === 'cm') {
      result = length * 100;
    } else {
      result = length;
    }
  } else if (from === 'cm') {
    if (to === 'km') {
      result = length / 100000;
    } else if (to === 'm') {
      result = length / 100;
    } else {
      result = length;
    }
  }

  if (from === to) {
    console.log(`The length is already in ${to}: ${result}`);
  } else if (result !== undefined) {
    console.log(`Converted ${length}${from} to ${result}${to}`);
  } else {
    console.log(`Unsupported conversion from ${from} to ${to}`);
  }

  return result;
}

// Example usage:
convertLength(2, 'km', 'm');
convertLength(150, 'm', 'cm');
convertLength(30000, 'cm', 'km');
